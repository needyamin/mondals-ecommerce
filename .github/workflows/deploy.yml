name: Deploy Mondal's E-Commerce (Cloudflare Tunnel)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Local Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Cloudflare Tunnel (Local SSH)
        run: |
          nohup cloudflared access ssh --hostname ${{ secrets.SSH_HOST }} > cloudflared.log 2>&1 &

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: localhost                 # Cloudflare tunnel forwards SSH to localhost
          port: 22                        # Cloudflare Tunnel port
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce || (echo "❌ Project directory not found!" && exit 1)
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh