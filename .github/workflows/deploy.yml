name: Deploy Mondal's E-Commerce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Ubuntu Server via SSH
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout the code
      - name: Git Checkout
        uses: actions/checkout@v4

      # 2️⃣ Install cloudflared on the GitHub Action runner (REQUIRED for Cloudflare Tunnel)
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      # 3️⃣ Deploy via SSH using cloudflared as a proxy
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}       # ssh.needyamin.site
          port: 22
          username: ${{ secrets.SSH_USER }}   # needyamin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # This command is the 'bridge' that finds your server through the tunnel
          proxy_command: /usr/local/bin/cloudflared access ssh --hostname ${{ secrets.SSH_HOST }}
          script: |
            # Navigate to your project
            cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce || (echo "❌ Project directory not found!" && exit 1)

            # Make deploy script executable and run it
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
