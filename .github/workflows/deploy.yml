name: Deploy Mondal's E-Commerce
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy to Ubuntu Server via SSH
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Git Checkout
        uses: actions/checkout@v4

      # 2️⃣ Install cloudflared
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          which cloudflared   # debug path

      # 3️⃣ Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Avoid host verification issues
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 4️⃣ Deploy via Cloudflare Tunnel
      - name: Deploy via SSH
        run: |
          ssh -o "ProxyCommand=cloudflared access ssh --hostname %h" \
              -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
                
                # Navigate to project directory
                if [ -d "$HOME/mondals-ecommerce" ]; then
                  cd $HOME/mondals-ecommerce
                else
                  cd /var/www/mondals-ecommerce
                fi

                # Pull latest code
                git pull origin main

                # Run deploy script
                chmod +x scripts/deploy.sh
                ./scripts/deploy.sh

              EOF
