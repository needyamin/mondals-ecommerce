name: Deploy Mondal's E-Commerce (Cloudflare Tunnel)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Local Ubuntu via Cloudflare Tunnel
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Cloudflare Tunnel (Local SSH Port 22)
        run: |
          nohup cloudflared access ssh --hostname ${{ secrets.SSH_HOST }} --local-ssh-port 22 > cloudflared.log 2>&1 &
          echo "Waiting 5 seconds for tunnel to be ready..."
          sleep 5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.needyamin.site
          port: 22
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce || (echo "❌ Project directory not found!" && exit 1)
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh