name: Deploy Mondal's E-Commerce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via Cloudflare Tunnel SSH
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      # SSH over Cloudflare Tunnel (cloudflared access ssh). SSH_HOST = tunnel hostname from Zero Trust.
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          CF="$(command -v cloudflared)"
          ssh -o "ProxyCommand=$CF access ssh --hostname %h" \
              -o "StrictHostKeyChecking=no" \
              -i ~/.ssh/id_rsa \
              "$SSH_USER@$SSH_HOST" \
              "cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce; chmod +x scripts/deploy.sh; ./scripts/deploy.sh"
