name: Deploy Mondal's E-Commerce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Ubuntu Server via SSH (Cloudflare Tunnel)
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Install cloudflared
      - name: Install cloudflared
        run: |
          set -euxo pipefail
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      # 3️⃣ Setup SSH safely
      - name: Setup SSH
        run: |
          set -euxo pipefail

          echo "HOME: $HOME"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          # Add private key safely
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

          # Avoid host verification issues
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> "$HOME/.ssh/known_hosts"

      # 4️⃣ Deploy via SSH using Cloudflare Tunnel
      - name: Deploy to Server
        run: |
          set -euxo pipefail

          ssh -o "ProxyCommand=cloudflared access ssh --hostname %h" \
              -o StrictHostKeyChecking=no \
              -i "$HOME/.ssh/id_rsa" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'

              set -e

              echo "Connected to server"

              # Detect project path
              if [ -d "$HOME/mondals-ecommerce" ]; then
                cd "$HOME/mondals-ecommerce"
              elif [ -d "/var/www/mondals-ecommerce" ]; then
                cd "/var/www/mondals-ecommerce"
              else
                echo "Project directory not found!"
                exit 1
              fi

              echo "Pulling latest code..."
              git pull origin main

              echo "Running deploy script..."
              chmod +x scripts/deploy.sh
              ./scripts/deploy.sh

              echo "Deployment completed!"

          EOF
