name: Deploy Mondal's E-Commerce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via Cloudflare Tunnel SSH
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install cloudflared
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      # 3️⃣ Configure SSH to use Cloudflare Tunnel
      - name: Configure SSH for Cloudflare Access
        run: |
          mkdir -p ~/.ssh
          # Write SSH key from secret
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # SSH config to use cloudflared as ProxyCommand
          cat <<EOF > ~/.ssh/config
Host ${{ secrets.SSH_HOST }}
    ProxyCommand cloudflared access ssh --hostname %h
    User ${{ secrets.SSH_USER }}
    IdentityFile ~/.ssh/id_rsa
    StrictHostKeyChecking no
EOF
          chmod 600 ~/.ssh/config

      # 4️⃣ Test SSH connection
      - name: Test SSH connection
        run: ssh ${{ secrets.SSH_HOST }} "echo 'SSH via Cloudflare Tunnel OK'"

      # 5️⃣ Deploy via SSH
      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce || exit 1
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
          EOF