name: Deploy Mondal's E-Commerce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Ubuntu Server via SSH
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout the code
      - name: Git Checkout
        uses: actions/checkout@v4

      # 2️⃣ Install cloudflared (REQUIRED for Tunnel)
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      # 3️⃣ Deploy via SSH using standard bash commands
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          # Setup SSH directory and private key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Use cloudflared as a ProxyCommand to connect to your tunnel
          ssh -o "ProxyCommand=/usr/local/bin/cloudflared access ssh --hostname %h" \
              -o "StrictHostKeyChecking=no" \
              -i ~/.ssh/id_rsa \
              $SSH_USER@$SSH_HOST \
              "cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce; chmod +x scripts/deploy.sh; ./scripts/deploy.sh"
