# Cloudflare Tunnel SSH — same idea as locally:
#   ssh -i ~/.ssh/id_ed25519 needyamin@ssh.needyamin.site
# when ~/.ssh/config uses: ProxyCommand cloudflared access ssh --hostname %h
#
# CI cannot open a browser; use Access Service Token secrets (non-interactive).
#
# GitHub secrets:
#   SSH_HOST=ssh.needyamin.site
#   SSH_USER=needyamin
#   SSH_PRIVATE_KEY=contents of id_ed25519 (full BEGIN/END block)
#   CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET — Zero Trust → Access → Service Auth → Service Token
#   (Allow that token on your SSH Access application policy.)
#
# If you see: "address ….access: missing port" — that fails on the RUNNER (cloudflared), not your Ubuntu
# sshd. Fix Cloudflare: same hostname as the Access app, token allowed in that app’s policy, try explicit
# hostname below (not %h). See: https://developers.cloudflare.com/cloudflare-one/networks/connectors/cloudflare-tunnel/use-cases/ssh/

name: "Deploy Mondals Ecommerce"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via Cloudflare Tunnel SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          set -euxo pipefail
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          # Runner PATH often prefers /usr/local/bin (preinstalled); .deb installs to /usr/bin
          test -x /usr/bin/cloudflared
          /usr/bin/cloudflared --version

      - name: Deploy over SSH (Tunnel)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euxo pipefail
          if [ -z "${CF_ACCESS_CLIENT_ID:-}" ] || [ -z "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
            echo "Add repo secrets: CF_ACCESS_CLIENT_ID and CF_ACCESS_CLIENT_SECRET (Access Service Token)."
            exit 1
          fi

          # Must be the tunnel hostname (e.g. ssh.needyamin.site), not an Access app UUID
          SSH_HOST="$(printf '%s' "$SSH_HOST" | tr -d '[:space:]')"
          case "$SSH_HOST" in *.*) ;; *)
            echo "SSH_HOST must be your SSH FQDN (e.g. ssh.needyamin.site), not a UUID or team id."
            exit 1
          ;; esac

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          export CLOUDFLARE_ACCESS_CLIENT_ID="$CF_ACCESS_CLIENT_ID"
          export CLOUDFLARE_ACCESS_CLIENT_SECRET="$CF_ACCESS_CLIENT_SECRET"

          CF=/usr/bin/cloudflared
          # Use literal hostname (not %%h) — avoids mis-resolved internal *.access addresses on some runners
          ssh -T \
            -o "ProxyCommand=${CF} access ssh --hostname ${SSH_HOST} --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i "$HOME/.ssh/id_ed25519" \
            "${SSH_USER}@${SSH_HOST}" \
            "set -e; cd ~/mondals-ecommerce 2>/dev/null || cd /var/www/mondals-ecommerce || (echo Project directory not found; exit 1); chmod +x scripts/deploy.sh; ./scripts/deploy.sh"
