# appleboy/ssh-action + cloudflared ProxyCommand (Cloudflare Tunnel SSH).
#
# Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY (ed25519 ok)
# Also add (Zero Trust → Access → Service Auth → Service Token) — required for CI:
#   CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET
# dpkg installs cloudflared to /usr/bin/cloudflared (not /usr/local/bin).

name: "Deploy Mondals Ecommerce"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Ubuntu Server via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          set -euxo pipefail
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          command -v cloudflared
          cloudflared --version

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 22
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Same tunnel as your laptop; CI needs Access service token (non-interactive)
          proxy_command: >-
            /usr/bin/cloudflared access ssh --hostname ${{ secrets.SSH_HOST }}
            --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }}
            --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          script: |
            cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce || (echo "Project directory not found" && exit 1)
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
