name: Deploy Mondal's E-Commerce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Ubuntu Server via SSH (Cloudflare Tunnel)
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Git Checkout
        uses: actions/checkout@v4

      # 2️⃣ Install cloudflared
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          which cloudflared
          cloudflared --version

      # 3️⃣ Setup SSH + Cloudflare Access auth
      - name: Setup SSH & Cloudflare Access
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          CF_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh

          # Private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Cloudflare Access Service Token (CRITICAL FIX)
          echo "export CLOUDFLARE_ACCESS_CLIENT_ID=$CF_CLIENT_ID" >> ~/.bashrc
          echo "export CLOUDFLARE_ACCESS_CLIENT_SECRET=$CF_CLIENT_SECRET" >> ~/.bashrc

          export CLOUDFLARE_ACCESS_CLIENT_ID=$CF_CLIENT_ID
          export CLOUDFLARE_ACCESS_CLIENT_SECRET=$CF_CLIENT_SECRET

          # SSH config with ProxyCommand
          cat <<EOF >> ~/.ssh/config
          Host $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand /usr/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      # 4️⃣ Debug (optional but useful)
      - name: Debug Cloudflare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          CF_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          export CLOUDFLARE_ACCESS_CLIENT_ID=$CF_CLIENT_ID
          export CLOUDFLARE_ACCESS_CLIENT_SECRET=$CF_CLIENT_SECRET

          cloudflared access ssh --hostname $SSH_HOST || true

      # 5️⃣ Deploy
      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh $SSH_HOST "
            cd ~/mondals-ecommerce || cd /var/www/mondals-ecommerce
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
          "
