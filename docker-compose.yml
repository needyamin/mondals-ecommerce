# Local Development Docker Compose
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mondals-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_DATABASE: mondals_ecommerce
      DB_USERNAME: root
      DB_PASSWORD: root_password
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mondals-db
    restart: unless-stopped
    ports:
      - "3388:3306"
    environment:
      MYSQL_DATABASE: mondals_ecommerce
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mondals-pma
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - db

volumes:
  dbdata:
