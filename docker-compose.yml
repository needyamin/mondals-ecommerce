# Mondal's E-Commerce - Docker Compose
# Usage: docker compose up -d --build
services:
  caddy:
    image: caddy:2-alpine
    container_name: mondals-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    # No command needed when using a Caddyfile at the standard path
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mondals-app
    restart: unless-stopped
    # App is hidden behind Caddy now, but we expose 8000 for local network fallback
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/public/build
    environment:
      APP_NAME: "Mondals"
      APP_ENV: ${APP_ENV:-local}
      APP_URL: https://needyamin.site
      APP_DEBUG: ${APP_DEBUG:-true}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mondals_ecommerce}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root_password}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      RUN_SEEDERS: ${RUN_SEEDERS:-false}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mondals-db
    restart: unless-stopped
    ports:
      - "3388:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mondals_ecommerce}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mondals-pma
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
  caddy_data:
  caddy_config:
