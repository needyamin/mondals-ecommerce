# One-shot after deploy or schema changes (not part of kustomization by default):
#   kubectl apply -f k8s/migrate-job.yaml
# If a previous job exists: kubectl delete job mondals-migrate -n mondals-ecommerce
apiVersion: batch/v1
kind: Job
metadata:
  name: mondals-migrate
  namespace: mondals-ecommerce
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mondals-db-service 3306; do echo waiting for mysql; sleep 2; done
      containers:
        - name: migrate
          image: your-docker-registry/mondals-app:latest
          imagePullPolicy: IfNotPresent
          command: ["php", "artisan", "migrate", "--force"]
          envFrom:
            - configMapRef:
                name: mondals-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: mondals-secrets
                  key: APP_KEY
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mondals-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mondals-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
