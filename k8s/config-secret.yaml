apiVersion: v1
kind: ConfigMap
metadata:
  name: mondals-config
  namespace: mondals-ecommerce
data:
  APP_NAME: "Mondals"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://needyamin.site"
  DB_CONNECTION: "mysql"
  DB_HOST: "mondals-db-service"
  DB_PORT: "3306"
  DB_DATABASE: "mondals_ecommerce"
  SESSION_DRIVER: "database"
  CACHE_STORE: "database"
  QUEUE_CONNECTION: "database"
  # Match docker-compose / entrypoint: migrations via Job or CI, not every pod start
  RUN_MIGRATIONS: "false"
  RUN_SEEDERS: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: mondals-secrets
  namespace: mondals-ecommerce
type: Opaque
stringData:
  # Full Laravel key string (starts with base64:). Generate: php artisan key:generate --show
  APP_KEY: "base64:CHANGE_ME_GENERATE_WITH_php_artisan_key_generate"
  DB_USERNAME: "root"
  DB_PASSWORD: "root_password"
