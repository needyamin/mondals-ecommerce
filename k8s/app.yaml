apiVersion: apps/v1
kind: Deployment
metadata:
  name: mondals-app
  namespace: mondals-ecommerce
  labels:
    app.kubernetes.io/name: mondals-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mondals-app
  template:
    metadata:
      labels:
        app: mondals-app
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mondals-db-service 3306; do echo waiting for mysql; sleep 2; done
      containers:
        - name: app
          # Build/push from repo Dockerfile, then set your registry image here
          image: your-docker-registry/mondals-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: mondals-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: mondals-secrets
                  key: APP_KEY
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mondals-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mondals-secrets
                  key: DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mondals-app-service
  namespace: mondals-ecommerce
  labels:
    app.kubernetes.io/name: mondals-app
spec:
  type: ClusterIP
  selector:
    app: mondals-app
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mondals-ingress
  namespace: mondals-ecommerce
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - needyamin.site
      secretName: needyamin-site-tls
  rules:
    - host: needyamin.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mondals-app-service
                port:
                  number: 80
